# ─────────────────────────────────────────────
#  Server
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
#  Database  (override via env vars in prod)
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ems_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ashin@987}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.pool-name=EmsHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ─────────────────────────────────────────────
#  JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─────────────────────────────────────────────
#  JWT
# ─────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:ChangeThisToALongRandomSecretKeyInProductionEnvironment123!}
app.jwt.expiration-ms=86400000

# ─────────────────────────────────────────────
#  Logging
# ─────────────────────────────────────────────
logging.level.com.ems=INFO
logging.level.org.springframework.security=WARN
