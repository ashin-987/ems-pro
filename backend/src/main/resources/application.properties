# ==========================================
# EMS Pro v2 - Production Configuration
# ==========================================
# This file supports both local development and production deployment
# Environment variables take precedence over default values

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
# FIXED: Now supports both local dev and production
# Local dev: Uses localhost:3306
# Production (Render): Uses DATABASE_URL environment variable
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ems_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ashin@987}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
# REMOVED: Hibernate auto-detects MySQL dialect (fixes warning)
# spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Enable JPA Auditing (for @CreatedBy, @LastModifiedBy)
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# ==========================================
# JWT CONFIGURATION
# ==========================================
# IMPORTANT: Change these in production!
# Generate secret: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:b8f3a9c2e5d7f1a4b6c8e2d4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION:3600000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.issuer=${JWT_ISSUER:ems-pro}

# ==========================================
# CORS CONFIGURATION
# ==========================================
# Set your frontend URL in production
app.cors.allowed-origins=${CORS_ORIGINS:\
http://localhost:5173,\
http://localhost:3000,\
https://ems-pro-rvdv.vercel.app,\
https://ems-pro-rvdv-git-main-ashins-projects-0b450a2b.vercel.app,\
https://ems-pro-rvdv-ig967aapr-ashins-projects-0b450a2b.vercel.app}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.ems=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.web=${WEB_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${BINDER_LOG_LEVEL:TRACE}

# Log file configuration (for production)
logging.file.name=${LOG_FILE:./logs/ems-pro.log}
logging.file.max-size=${LOG_MAX_SIZE:10MB}
logging.file.max-history=${LOG_MAX_HISTORY:30}

# ==========================================
# ACTUATOR CONFIGURATION (Health Checks)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ==========================================
# SECURITY CONFIGURATION
# ==========================================
# Rate limiting
app.security.rate-limit.login-attempts=${RATE_LIMIT_ATTEMPTS:5}
app.security.rate-limit.lock-duration-minutes=${RATE_LIMIT_DURATION:15}

# Password policy
app.security.password.min-length=${PASSWORD_MIN_LENGTH:8}
app.security.password.require-special-char=${PASSWORD_REQUIRE_SPECIAL:true}
app.security.password.require-number=${PASSWORD_REQUIRE_NUMBER:true}
app.security.password.require-uppercase=${PASSWORD_REQUIRE_UPPER:true}

# ==========================================
# APPLICATION INFO
# ==========================================
spring.application.name=EMS Pro
app.version=2.0.0
app.description=Employee Management System - Production Ready

# ==========================================
# PRODUCTION OPTIMIZATIONS
# ==========================================
spring.jackson.serialization.indent_output=${PRETTY_PRINT_JSON:false}
spring.jackson.default-property-inclusion=non_null
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# ==========================================
# TIMEZONE CONFIGURATION
# ==========================================
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==========================================
# DEVELOPMENT vs PRODUCTION PROFILES
# ==========================================
# Activate with: -Dspring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILE:dev}

# ==========================================
# ENVIRONMENT SPECIFIC NOTES
# ==========================================
# For Render.com deployment:
#   - Set DATABASE_URL in Render dashboard (auto-provided if using Render DB)
#   - Set DB_USERNAME and DB_PASSWORD
#   - Set CORS_ORIGINS to your Vercel frontend URL
#
# For Aiven database:
#   - DATABASE_URL format: jdbc:mysql://host:port/database?useSSL=true
#   - Get connection details from Aiven dashboard
#
# For Vercel frontend:
#   - Set VITE_API_URL to your Render backend URL
#
# Security Checklist:
#   ✓ Change JWT_SECRET (use openssl rand -base64 64)
#   ✓ Set strong DB_PASSWORD
#   ✓ Update CORS_ORIGINS to your frontend URL
#   ✓ Set DDL_AUTO to 'validate' in production
#   ✓ Set SHOW_SQL to false in production
#   ✓ Enable HTTPS in production
